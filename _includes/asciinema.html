<script src="/assets/js/asciinema-player.min.js"></script>
<link rel="stylesheet" href="/assets/css/asciinema-player.css">
<script>
  document.addEventListener("DOMContentLoaded", function() {
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        const player = entry.target._player;
        if (player) entry.isIntersecting ? player.play() : player.pause();
      });
    });

    document.querySelectorAll('img[src*=".cast."]').forEach(img => {
      const castSrc = img.src.replace(/\.(png|jpg|webp|gif)$/i, '');
      const playerDiv = document.createElement('div');
      playerDiv.className = 'asciinema-player';
      playerDiv._player = AsciinemaPlayer.create(castSrc, playerDiv, {
        loop: true,
        theme: 'asciinema',
        fit: 'width',
      });
      img.replaceWith(playerDiv);
      observer.observe(playerDiv);
    });
  });
</script>
